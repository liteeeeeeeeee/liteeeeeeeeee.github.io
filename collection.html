<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Collection</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          ink: { 950: '#03060d', 900: '#070b18', 800: '#0c1226', 700: '#121a36' },
          azure: { 400: '#5aa9ff', 500: '#2f8bff', 600: '#1f6df0', 700: '#1556c7' },
        },
      },
    },
  };
</script>
</head>
<body class="bg-ink-950 text-slate-100 font-sans antialiased overflow-x-hidden">

<div class="fixed inset-0 -z-10 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-br from-ink-950 via-ink-900 to-black"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="absolute inset-0 grid-bg opacity-[0.05]"></div>
</div>

<nav class="sticky top-0 z-50 backdrop-blur-xl bg-ink-950/60 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="group flex items-center gap-2.5">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-azure-400 to-azure-700 grid place-items-center shadow-lg shadow-azure-600/30 group-hover:scale-110 transition-transform duration-300">
        <span class="block w-3 h-3 bg-ink-950 rounded-sm rotate-45"></span>
      </span>
      <span class="font-semibold tracking-tight text-lg">liteeeeeeeeee</span>
    </a>
    <div class="flex items-center gap-1 text-sm">
      <a href="index.html" class="nav-link">Home</a>
      <a href="collection.html" class="nav-link nav-active">Collection</a>
      <a href="lego.html" class="nav-link">LEGO 3D Viewer</a>
    </div>
  </div>
</nav>

<section class="max-w-7xl mx-auto px-6 pt-16 md:pt-24 pb-12">
  <div class="reveal">
    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-azure-500/10 border border-azure-500/20 text-azure-400 text-xs font-medium mb-6">
      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
      Physical Media
    </div>
  </div>
  <h1 class="reveal reveal-2 text-4xl md:text-6xl font-extrabold tracking-tighter">
    The <span class="bg-gradient-to-r from-azure-400 to-azure-700 bg-clip-text text-transparent">Media Collection</span>
  </h1>
  <p class="reveal reveal-3 mt-4 text-slate-400 max-w-2xl">DVDs, Blu-rays and box sets etc.</p>
</section>

<!-- Controls -->
<section class="max-w-7xl mx-auto px-6 pb-8">
  <div class="reveal reveal-4 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
    <div class="relative flex-1 max-w-xl">
      <svg class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search titles..." class="input" />
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <span class="text-xs text-slate-500 mr-2">Sort by:</span>
      <div id="sortChips" class="flex flex-wrap gap-2">
        <button class="chip active" data-sort="all">All</button>
      </div>
    </div>
  </div>
  <div class="reveal reveal-5 mt-4 flex items-center gap-3 text-sm text-slate-500">
    <span id="count">—</span>
    <span class="w-1 h-1 rounded-full bg-slate-700"></span>
    <span id="totals">—</span>
  </div>
</section>

<!-- Grid -->
<section class="max-w-7xl mx-auto px-6 pb-24">
  <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
  <div id="empty" class="hidden text-center py-20 text-slate-500">
    <svg class="w-12 h-12 mx-auto mb-4 opacity-40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No matches. Try a different search.</p>
  </div>
</section>

<footer class="border-t border-white/5 py-8">
  <div class="max-w-7xl mx-auto px-6 text-sm text-slate-500 flex justify-between flex-wrap gap-3">
    <span>© <span id="year"></span></span>
    <span class="text-slate-600"></span>
  </div>
</footer>

<script src="assets/main.js"></script>
<script>
(async () => {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search');
  const empty = document.getElementById('empty');
  const sortChips = document.getElementById('sortChips');
  const countEl = document.getElementById('count');
  const totalsEl = document.getElementById('totals');

  // Skeleton placeholders
  grid.innerHTML = Array.from({ length: 10 }).map(() =>
    `<div class="media-card"><div class="img-wrap skeleton" style="border-radius:0"></div><div class="meta"><div class="skeleton" style="height:14px;width:75%"></div><div class="skeleton" style="height:10px;width:50%;margin-top:8px"></div></div></div>`
  ).join('');

  let items = [];
  try {
    const res = await fetch('collection.json', { cache: 'no-cache' });
    items = await res.json();
  } catch (e) {
    grid.innerHTML = `<div class="msg msg-error col-span-full">${e.message}</div>`;
    return;
  }

  // Build type chips dynamically
  const types = Array.from(new Set(items.map(i => i.type).filter(Boolean))).sort();
  types.forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.sort = t;
    b.textContent = t;
    sortChips.appendChild(b);
  });

  let activeFilter = 'all';
  let query = '';

  const typeClass = (t) => {
    const v = (t || '').toLowerCase();
    if (v.includes('4k')) return 'type-4k';
    if (v.includes('blu')) return 'type-bluray';
    if (v.includes('dvd')) return 'type-dvd';
    return 'type-dvd';
  };

  const escape = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const render = () => {
    const q = query.trim().toLowerCase();
    let filtered = items.filter(i => {
      const text = `${i.english || ''} ${i.finnish || ''}`.toLowerCase();
      const matchSearch = !q || text.includes(q);
      const matchType = activeFilter === 'all' || (i.type || '').toLowerCase() === activeFilter.toLowerCase();
      return matchSearch && matchType;
    });

    // Sort by type when a specific filter active, else by title
    if (activeFilter === 'all') {
      filtered.sort((a, b) => (a.type || '').localeCompare(b.type || '') || (a.english || '').localeCompare(b.english || ''));
    } else {
      filtered.sort((a, b) => (a.english || '').localeCompare(b.english || ''));
    }

    countEl.textContent = `${filtered.length} ${filtered.length === 1 ? 'item' : 'items'} shown`;
    const totals = types.map(t => `${items.filter(i => i.type === t).length} ${t}`).join(' · ');
    totalsEl.textContent = totals;

    if (!filtered.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    grid.innerHTML = filtered.map((it, idx) => `
      <article class="media-card in-view" style="transition-delay:${Math.min(idx * 40, 400)}ms">
        <div class="img-wrap">
          ${it.image
            ? `<img src="${escape(it.image)}" alt="${escape(it.english)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'w-full h-full grid place-items-center text-slate-600 text-xs',textContent:'No image'}))" />`
            : `<div class="w-full h-full grid place-items-center text-slate-600 text-xs">No image</div>`
          }
        </div>
        <div class="meta">
          <div class="flex items-start justify-between gap-2">
            <h3 class="text-sm font-semibold tracking-tight leading-snug line-clamp-2">${escape(it.english)}</h3>
            <span class="type-tag ${typeClass(it.type)} shrink-0">${escape(it.type)}</span>
          </div>
          ${it.finnish ? `<p class="mt-1 text-xs text-slate-500 line-clamp-1">${escape(it.finnish)}</p>` : ''}
          <div class="mt-3 flex items-center justify-between text-xs text-slate-500">
            <span class="flex items-center gap-1.5">${escape(it.flag || '')} ${escape(it.country || '')}</span>
            <span>${escape(it.releaseDate || '')}</span>
          </div>
        </div>
      </article>
    `).join('');

    // Re-observe new in-view elements
    requestAnimationFrame(() => {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.05 });
      grid.querySelectorAll('.in-view').forEach(el => io.observe(el));
    });
  };

  // Wire up chips
  sortChips.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    sortChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.sort;
    render();
  });

  // Search with light debounce
  let t;
  search.addEventListener('input', (e) => {
    clearTimeout(t);
    t = setTimeout(() => { query = e.target.value; render(); }, 80);
  });

  render();
})();
</script>
</body>
</html>
